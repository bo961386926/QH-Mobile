<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>选择设备 - 设备更换</title>
    <link rel="stylesheet" href="../../assets/libs/bootstrap-icons-1.13.1/fonts/bootstrap-icons.css">
    <style>
        :root {
            --primary: #007AFF;
            --primary-bg: rgba(0,122,255,0.08);
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --border: #E5E5EA;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--font); min-height: 100vh; padding-top: 48px;
            -webkit-font-smoothing: antialiased;
        }

        /* ======== HEADER ======= */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 48px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px 0 4px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.08);
        }
        .header-back {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: none; border: none; font-size: 22px; color: var(--primary);
            cursor: pointer; border-radius: 50%;
        }
        .header-back:active { background: rgba(0,0,0,0.06); }
        .header-title { font-size: 17px; font-weight: 600; }
        .header-target-tag {
            font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
            white-space: nowrap; flex-shrink: 0;
        }
        .header-target-tag.old { background: rgba(255,149,0,0.1); color: #FF9500; }
        .header-target-tag.new { background: rgba(52,199,89,0.1); color: #34C759; }

        /* ======== MAIN ======= */
        .main-content {
            padding: 10px 14px 28px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

        /* =============================================
           SEARCH BAR — 美团式大搜索
           ============================================= */
        .search-hero {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 3px 3px 3px 12px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-sm);
            display: flex; align-items: center;
        }
        .search-icon-wrap {
            color: var(--text-tertiary); font-size: 17px;
            margin-right: 6px; flex-shrink: 0;
        }
        .search-input {
            flex: 1; min-width: 0; border: none; background: transparent;
            font-size: 15px; color: var(--text); padding: 10px 0;
            outline: none; font-family: var(--font); letter-spacing: -0.1px;
        }
        .search-input::placeholder { color: var(--text-tertiary); }
        .search-input::-webkit-search-cancel-button { display: none; }
        .search-clear {
            width: 26px; height: 26px; border-radius: 50%; border: none;
            background: var(--text-tertiary); color: white; font-size: 11px;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            flex-shrink: 0; margin-right: 4px;
        }
        .search-clear.show { display: flex; }
        .search-scan-btn {
            padding: 8px 13px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, #FF6B35, #FF4500);
            color: white; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: var(--font);
            white-space: nowrap; flex-shrink: 0; margin-left: 4px;
        }
        .search-scan-btn:active { opacity: 0.85; transform: scale(0.96); }
        .search-more-btn {
            width: 34px; height: 34px; border-radius: 10px;
            border: none; background: var(--bg);
            color: var(--text-secondary); font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-left: 4px;
        }
        .search-more-btn:active { background: rgba(0,122,255,0.1); color: var(--primary); }

        /* =============================================
           FILTER COMPACT ROW — 定位 + 范围 (美团式辅助行)
           ============================================= */
        .filter-compact {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        /* 定位 — 单行胶囊 */
        .loc-pill {
            flex: 1; display: flex; align-items: center; gap: 5px;
            background: var(--surface); border-radius: 20px;
            padding: 6px 10px 6px 8px;
            box-shadow: var(--shadow-sm);
            font-size: 12px; color: var(--text-secondary);
            min-width: 0; border: 1px solid transparent;
        }
        .loc-pill.located { border-color: rgba(0,122,255,0.1); }
        .loc-icon {
            flex-shrink: 0; font-size: 13px; color: var(--primary);
        }
        .loc-icon.pulsing { animation: locPulse 1.5s ease-in-out infinite; }
        @keyframes locPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
        .loc-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
        .loc-text b { color: var(--text); font-weight: 600; }
        .loc-text em { color: var(--primary); font-style: normal; font-weight: 500; }
        .loc-refresh-btn {
            width: 22px; height: 22px; border-radius: 50%;
            border: none; background: transparent;
            color: var(--text-tertiary); font-size: 11px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .loc-refresh-btn:active { background: var(--bg); color: var(--primary); }
        .loc-refresh-btn.spinning i { animation: spin .8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* 范围 — 小pill chips (美团筛选标签) */
        .radius-chips { display: flex; gap: 5px; flex-shrink: 0; }
        .radius-chip {
            padding: 6px 10px; border-radius: 14px;
            border: 1px solid var(--border); background: var(--surface);
            font-size: 11.5px; font-weight: 500; color: var(--text-secondary);
            cursor: pointer; white-space: nowrap; font-family: var(--font);
            transition: all .18s ease; user-select: none;
        }
        .radius-chip:active { transform: scale(0.94); }
        .radius-chip.active {
            background: var(--primary); color: white; border-color: var(--primary);
            font-weight: 600; box-shadow: 0 2px 6px rgba(0,122,255,0.25);
        }

        /* Action Sheet */
        .action-sheet-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.3); display: none; align-items: flex-end;
            animation: oIn .2s ease-out;
        }
        .action-sheet-overlay.show { display: flex; }
        @keyframes oIn { from{opacity:0} to{opacity:1} }
        .action-sheet {
            width: 100%; background: var(--surface);
            border-radius: 14px 14px 0 0; padding: 8px 16px 32px;
            animation: sUp .3s cubic-bezier(.32,.72,0,1);
        }
        @keyframes sUp { from{transform:translateY(100%)} to{transform:none} }
        .sheet-handle { width: 36px; height: 5px; background: var(--border); border-radius: 3px; margin: 0 auto 16px; }
        .sheet-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); letter-spacing: .5px; margin-bottom: 12px; }
        .sheet-actions { display: flex; gap: 12px; }
        .sheet-action-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 20px 12px; border-radius: var(--radius-md);
            border: 1.5px solid var(--border); background: var(--surface);
            cursor: pointer; transition: all var(--transition); font-family: var(--font);
        }
        .sheet-action-btn:active { background: var(--bg); transform: scale(.97); }
        .sheet-action-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .sheet-action-icon.scan { background: var(--primary-bg); color: var(--primary); }
        .sheet-action-icon.nfc { background: rgba(52,199,89,0.1); color: var(--success); }
        .sheet-action-label { font-size: 13px; font-weight: 500; }
        .sheet-cancel {
            width: 100%; margin-top: 12px; padding: 14px; border-radius: var(--radius-md);
            border: none; background: var(--bg); font-size: 15px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; font-family: var(--font);
        }
        .sheet-cancel:active { background: var(--border); }

        /* ======== SITE STRIP ======== */
        .site-strip {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 1px 0 4px; margin-bottom: 10px;
            -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity;
            position: relative;
        }
        .site-strip::-webkit-scrollbar { display: none; }
        .site-strip::after {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0;
            width: 28px; background: linear-gradient(to left, var(--bg), transparent);
            pointer-events: none; z-index: 1;
        }
        .site-mini-card {
            flex-shrink: 0; padding: 9px 12px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); cursor: pointer;
            transition: all var(--transition); scroll-snap-align: start;
            user-select: none;
        }
        .site-mini-card.empty { opacity: 0.45; }
        .site-mini-card:active { transform: scale(.95); }
        .site-mini-card.active { border-color: var(--primary); background: var(--primary-bg); }
        .smc-name { font-size: 12.5px; font-weight: 600; white-space: nowrap; line-height: 1.25; }
        .site-mini-card.active .smc-name { color: var(--primary); }
        .smc-meta { font-size: 10.5px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; line-height: 1.25; }
        .site-mini-card.active .smc-meta { color: rgba(0,122,255,0.65); }

        /* ======== RESULT BAR ======== */
        .result-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
        .result-count { font-size: 13px; font-weight: 600; }
        .result-hint { font-size: 11.5px; color: var(--text-tertiary); }

        /* ======== GROUP HEADER ======== */
        .group-header { display: flex; align-items: center; gap: 7px; padding: 12px 2px 8px; }
        .group-header:first-child { padding-top: 0; }
        .group-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .group-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
        .group-count { font-size: 10.5px; color: var(--text-tertiary); margin-left: auto; }

        /* ======== IOT DEVICE HEADER ======== */
        .iot-device-header {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 4px 6px 12px; margin: 2px 0 0;
            background: rgba(0,122,255,0.03); border-radius: var(--radius-sm);
            border-left: 3px solid rgba(0,122,255,0.25);
            cursor: default;
        }
        .iot-device-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
        .iot-device-name { font-size: 12px; font-weight: 500; color: var(--primary); line-height: 1.3; }
        .iot-device-sub-count { font-size: 10.5px; color: var(--text-tertiary); margin-left: auto; }

        /* ======== SUB DEVICE WRAPPER ======== */
        .sub-device-list { display: flex; flex-direction: column; gap: 6px; padding: 2px 0 2px 16px; }

        /* ======== DEVICE LIST ======== */
        .device-list { display: flex; flex-direction: column; gap: 7px; }
        .device-card {
            background: var(--surface); border-radius: var(--radius-md);
            padding: 12px 14px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid transparent; box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        .device-card:active { transform: scale(.985); background: #F9F9FB; border-color: rgba(0,122,255,0.2); }
        .device-status-dot {
            width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
        }
        .device-status-dot.online { background: var(--success); box-shadow: 0 0 0 3px rgba(52,199,89,0.15); }
        .device-status-dot.offline { background: var(--danger); box-shadow: 0 0 0 3px rgba(255,59,48,0.12); }
        .device-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 19px;
        }
        .device-icon.type-temp  { background: rgba(255,59,48,0.08); color: #FF3B30; }
        .device-icon.type-level { background: rgba(255,149,0,0.08); color: #FF9500; }
        .device-icon.type-water { background: rgba(0,122,255,0.08); color: #007AFF; }
        .device-icon.type-flow  { background: rgba(52,199,89,0.08); color: #34C759; }
        .device-info { flex: 1; min-width: 0; }
        .device-id { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; letter-spacing: -.1px; }
        .device-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .device-dist-badge {
            flex-shrink: 0; padding: 3px 9px; border-radius: 20px;
            font-size: 11.5px; font-weight: 600; letter-spacing: -.1px;
        }
        .device-dist-badge.near { background: rgba(52,199,89,0.1); color: var(--success); }
        .device-dist-badge.mid  { background: #F2F2F7; color: var(--text-secondary); }
        .device-dist-badge.far  { background: #F2F2F7; color: var(--text-tertiary); }
        .device-chevron { color: var(--text-tertiary); font-size: 13px; flex-shrink: 0; margin-left: 2px; transition: transform var(--transition); }
        .device-card:active .device-chevron { transform: translateX(2px); }

        /* ======== EMPTY STATE ======== */
        .empty-state { text-align: center; padding: 52px 24px; }
        .empty-icon { width: 58px; height: 58px; margin: 0 auto 14px; border-radius: 18px; background: #F2F2F7; display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--text-tertiary); }
        .empty-title { font-size: 15.5px; font-weight: 600; margin-bottom: 5px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; max-width: 240px; margin: 0 auto; }
        .empty-action { margin-top: 14px; padding: 9px 22px; border-radius: 20px; border: none; background: var(--primary); color: white; font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: var(--font); }
        .empty-action:active { opacity: .8; transform: scale(.97); }

        /* ======== OVERLAYS ======== */
        .full-overlay {
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.88);
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .full-overlay.show { display: flex; }
        .scan-frame { width: 220px; height: 220px; border: 2px solid rgba(255,255,255,0.25); border-radius: 20px; position: relative; margin-bottom: 28px; }
        .scan-frame .corner { position: absolute; width: 28px; height: 28px; border-color: white; border-style: solid; }
        .scan-frame .corner.tl { top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:20px 0 0 0 }
        .scan-frame .corner.tr { top:-1px;right:-1px;border-width:3px 3px 0 0;border-radius:0 20px 0 0 }
        .scan-frame .corner.bl { bottom:-1px;left:-1px;border-width:0 0 3px 3px;border-radius:0 0 0 20px }
        .scan-frame .corner.br { bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 20px 0 }
        .scan-line { position: absolute; left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:sweep 2s ease-in-out infinite;border-radius:1px; }
        @keyframes sweep { 0%{top:12px;opacity:0} 20%,80%{opacity:1} 100%{top:calc(100%-12px);opacity:0} }
        .overlay-hint { font-size: 15px; opacity:.75; font-weight: 500; }
        .overlay-cancel { margin-top:36px;padding:12px 40px;border:1px solid rgba(255,255,255,0.3);border-radius:22px;background:none;color:white;font-size:14px;cursor:pointer;font-family:var(--font);font-weight:500; }
        .nfc-ring { width:100px;height:100px;border-radius:50%;border:2.5px solid var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative; }
        .nfc-ring i { font-size:40px;color:var(--primary) }
        .nfc-ring::before,.nfc-ring::after { content:'';position:absolute;border-radius:50%;border:2px solid rgba(0,122,255,0.25);animation:nfcExpand 2s ease-out infinite; }
        .nfc-ring::before { inset:-16px;animation-delay:0s }
        .nfc-ring::after { inset:-32px;animation-delay:.7s }
        @keyframes nfcExpand { 0%{opacity:1;transform:scale(.85)} 100%{opacity:0;transform:scale(1.15)} }

        /* ======== TOAST ======== */
        .toast {
            position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
            background:rgba(0,0,0,0.82);color:white;padding:10px 22px;border-radius:20px;
            font-size:14px;z-index:300;white-space:nowrap;font-weight:500;
            backdrop-filter:blur(10px);animation:tIn .3s ease-out;
        }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%)translateY(8px)} to{opacity:1;transform:translateX(-50%)} }

        /* ======== PTR ======== */
        .ptr-indicator { text-align:center;padding:6px;color:var(--text-tertiary);font-size:13px;display:none; }
        .ptr-indicator.show { display:block; }
        .ptr-spinner { display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>

    <!-- Action Sheet -->
    <div class="action-sheet-overlay" id="actionSheetOverlay" onclick="closeActionSheet(event)">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title">快速查找设备</div>
            <div class="sheet-actions">
                <button class="sheet-action-btn" onclick="startNfc()">
                    <div class="sheet-action-icon nfc"><i class="bi bi-wifi"></i></div>
                    <span class="sheet-action-label">NFC感应</span>
                </button>
            </div>
            <button class="sheet-cancel" onclick="closeActionSheet()">取消</button>
        </div>
    </div>

    <!-- NFC Overlay -->
    <div class="full-overlay" id="nfcOverlay">
        <div class="nfc-ring"><i class="bi bi-wifi"></i></div>
        <div class="overlay-hint">请将手机靠近设备NFC标签</div>
        <button class="overlay-cancel" onclick="cancelNfc()">取消</button>
    </div>

    <!-- Header -->
    <header class="header">
        <button class="header-back" onclick="goBack()"><i class="bi bi-chevron-left"></i></button>
        <span class="header-title" id="pageTitle">选择设备</span>
        <span class="header-target-tag old" id="targetTag">待拆除</span>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="ptr-indicator" id="ptrIndicator"><span class="ptr-spinner"></span>刷新中...</div>

        <!-- 搜索栏 -->
        <div class="search-hero">
            <div class="search-icon-wrap"><i class="bi bi-search"></i></div>
            <input type="search" class="search-input" id="deviceSearch"
                   placeholder="搜索设备名称、编号或站点"
                   autocomplete="off" autocorrect="off">
            <button class="search-clear" id="searchClear" onclick="clearSearch()"><i class="bi bi-x-lg"></i></button>
            <button class="search-scan-btn" onclick="startScanDirect()">扫码</button>
            <button class="search-more-btn" onclick="openActionSheet()"><i class="bi bi-three-dots-vertical"></i></button>
        </div>

        <!-- 筛选紧凑行 -->
        <div class="filter-compact">
            <div class="loc-pill" id="locPill">
                <span class="loc-icon pulsing" id="locIcon"><i class="bi bi-geo-alt-fill"></i></span>
                <span class="loc-text" id="locText">正在定位...</span>
                <button class="loc-refresh-btn" id="locRefreshBtn" onclick="getLocation()" aria-label="刷新定位">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="radius-chips" id="radiusChips">
                <button class="radius-chip" onclick="setRadius(0)" data-r="0">全部</button>
                <button class="radius-chip" onclick="setRadius(500)" data-r="500">500m</button>
                <button class="radius-chip active" onclick="setRadius(1000)" data-r="1000">1km</button>
                <button class="radius-chip" onclick="setRadius(3000)" data-r="3000">3km</button>
                <button class="radius-chip" onclick="setRadius(5000)" data-r="5000">5km</button>
            </div>
        </div>

        <!-- Site Strip -->
        <div class="site-strip" id="siteStrip"></div>

        <!-- Result Bar -->
        <div class="result-bar">
            <span class="result-count" id="resultCount"></span>
            <span class="result-hint" id="resultHint"></span>
        </div>

        <!-- Device List -->
        <div class="device-list" id="deviceList"></div>
    </main>

    <input type="file" id="qrInput" accept="image/*" capture="environment" style="display:none" onchange="handleQrCapture(event)">

    <script>
        // ========== CONFIG — 从 URL 参数读取目标 ==========
        var params = new URLSearchParams(window.location.search);
        var pickTarget = params.get('target') || 'old'; // 'old' | 'new'
        var excludeId = params.get('exclude') || '';    // 要排除的设备ID

        // 根据 target 设置 UI
        if (pickTarget === 'new') {
            document.getElementById('pageTitle').textContent = '选择新设备';
            var tag = document.getElementById('targetTag');
            tag.textContent = '新安装';
            tag.className = 'header-target-tag new';
        }

        // ========== DATA ==========
        var sites = [
            { id: 'site-001', name: '城东水质监测站', address: '城东区污水处理厂区', lat: 30.2741, lng: 120.1551, color: '#007AFF' },
            { id: 'site-002', name: '城西泵站', address: '城西区排水泵站', lat: 30.2600, lng: 120.1300, color: '#FF9500' },
            { id: 'site-003', name: '北区管网监测点', address: '北区供水管网枢纽', lat: 30.3000, lng: 120.1700, color: '#34C759' }
        ];
        var iotDevices = [
            { id: 'IOT-001', name: '智能网关-A', site: 'site-001', icon: 'bi-hdd-stack', lat: 30.2745, lng: 120.1555 },
            { id: 'IOT-002', name: '智能网关-B', site: 'site-001', icon: 'bi-hdd-stack', lat: 30.2765, lng: 120.1540 },
            { id: 'IOT-003', name: '泵站控制柜', site: 'site-002', icon: 'bi-cpu', lat: 30.2603, lng: 120.1308 },
            { id: 'IOT-004', name: '管网监测终端', site: 'site-003', icon: 'bi-router', lat: 30.3002, lng: 120.1702 }
        ];
        var allDevices = [
            { id: 'DT-2024-001', name: '温度传感器', type: '温感传感器', icon: 'bi-thermometer-half', iconClass: 'type-temp', site: 'site-001', iotDevice: 'IOT-001', location: '一期生化池', lat: 30.2743, lng: 120.1553, status: 'online', paramKeys:['temperature','humidity'] },
            { id: 'DT-2024-002', name: '液位计', type: '超声波液位计', icon: 'bi-water', iconClass: 'type-level', site: 'site-001', iotDevice: 'IOT-001', location: '进水口', lat: 30.2760, lng: 120.1545, status: 'online', paramKeys:['level'] },
            { id: 'DT-2024-003', name: '温度传感器', type: '温感传感器', icon: 'bi-thermometer-half', iconClass: 'type-temp', site: 'site-001', iotDevice: 'IOT-002', location: '二期沉淀池', lat: 30.2750, lng: 120.1560, status: 'online', paramKeys:['temperature','humidity'] },
            { id: 'DT-2024-004', name: '流量计', type: '电磁流量计', icon: 'bi-speedometer2', iconClass: 'type-flow', site: 'site-001', iotDevice: 'IOT-002', location: '总出水口', lat: 30.2770, lng: 120.1558, status: 'online', paramKeys:['flow'] },
            { id: 'DT-2024-005', name: '压力传感器', type: '压阻式压力变送器', icon: 'bi-gauge', iconClass: 'type-water', site: 'site-001', iotDevice: 'IOT-001', location: '泵房主管道', lat: 30.2735, lng: 120.1540, status: 'online', paramKeys:['pressure'] },
            { id: 'DT-2024-006', name: '水质分析仪', type: '多参数水质监测仪', icon: 'bi-droplet-half', iconClass: 'type-water', site: 'site-001', iotDevice: 'IOT-002', location: '出水口', lat: 30.2780, lng: 120.1580, status: 'offline', paramKeys:['ph','turbidity'] },
            { id: 'DT-2024-007', name: '液位计', type: '雷达液位计', icon: 'bi-water', iconClass: 'type-level', site: 'site-002', iotDevice: 'IOT-003', location: '集水井A', lat: 30.2605, lng: 120.1305, status: 'online', paramKeys:['level'] },
            { id: 'DT-2024-008', name: '流量计', type: '超声波流量计', icon: 'bi-speedometer2', iconClass: 'type-flow', site: 'site-002', iotDevice: 'IOT-003', location: '出水管道', lat: 30.2610, lng: 120.1310, status: 'online', paramKeys:['flow'] },
            { id: 'DT-2024-009', name: '温度传感器', type: '温感传感器', icon: 'bi-thermometer-half', iconClass: 'type-temp', site: 'site-002', iotDevice: 'IOT-003', location: '泵房内部', lat: 30.2615, lng: 120.1295, status: 'online', paramKeys:['temperature','humidity'] },
            { id: 'DT-2024-010', name: '压力传感器', type: '压力变送器', icon: 'bi-gauge', iconClass: 'type-water', site: 'site-003', iotDevice: 'IOT-004', location: '主管段A', lat: 30.3005, lng: 120.1705, status: 'online', paramKeys:['pressure'] },
            { id: 'DT-2024-011', name: '流量计', type: '电磁流量计', icon: 'bi-speedometer2', iconClass: 'type-flow', site: 'site-003', iotDevice: 'IOT-004', location: '分支管段B', lat: 30.3010, lng: 120.1710, status: 'online', paramKeys:['flow'] },
            { id: 'DT-2024-012', name: '液位计', type: '静压液位计', icon: 'bi-water', iconClass: 'type-level', site: 'site-003', iotDevice: 'IOT-004', location: '蓄水池', lat: 30.3020, lng: 120.1690, status: 'offline', paramKeys:['level'] },
            { id: 'DT-2024-013', name: '水质分析仪', type: '在线水质监测仪', icon: 'bi-droplet-half', iconClass: 'type-water', site: 'site-003', iotDevice: 'IOT-004', location: '监测点B', lat: 30.3015, lng: 120.1720, status: 'online', paramKeys:['ph','turbidity'] }
        ];

        // 排除已选设备
        if (excludeId) {
            allDevices = allDevices.filter(function(d) { return d.id !== excludeId; });
        }

        // ========== STATE ==========
        var currentSite = 'all';
        var userLocation = null;
        var currentRadius = 1000;

        // ========== UTILS ==========
        function calcDistance(lat1, lng1, lat2, lng2) {
            var R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
            var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function formatDistance(m) { return m < 1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }
        function getDistClass(m) { return m < 200 ? 'near' : m < 1000 ? 'mid' : 'far'; }

        // ========== RADIUS ==========
        function setRadius(meters) {
            if (meters === 0) {
                // 「全部」→ 不限范围
                currentRadius = Infinity;
            } else {
                // 点击已选中的范围 → 取消筛选（显示全部）
                currentRadius = (currentRadius === meters) ? Infinity : meters;
            }
            document.querySelectorAll('.radius-chip').forEach(function(el) {
                var r = parseInt(el.dataset.r);
                el.classList.toggle('active', r === 0 ? currentRadius === Infinity : currentRadius !== Infinity && r === currentRadius);
            });
            updateLocPill();
            renderSiteStrip(); renderDevices();
        }

        // ========== LOCATION ==========
        function getLocation() {
            var icon = document.getElementById('locIcon');
            var pill = document.getElementById('locPill');
            var text = document.getElementById('locText');
            var btn = document.getElementById('locRefreshBtn');

            icon.classList.add('pulsing');
            btn.classList.add('spinning');
            pill.classList.remove('located');
            text.innerHTML = '定位中...';

            setTimeout(function() {
                userLocation = { lat: 30.2745, lng: 120.1555 };
                icon.classList.remove('pulsing'); btn.classList.remove('spinning'); pill.classList.add('located');
                updateLocPill();
                renderSiteStrip(); renderDevices();
            }, 1000);
        }

        function updateLocPill() {
            var text = document.getElementById('locText');
            if (!userLocation) { text.innerHTML = '定位中...'; return; }

            var nearestSite = null, nearestDist = Infinity;
            sites.forEach(function(s) {
                var d = calcDistance(userLocation.lat, userLocation.lng, s.lat, s.lng);
                if (d < nearestDist) { nearestDist = d; nearestSite = s; }
            });
            var nearbyCount = allDevices.filter(function(d) {
                return calcDistance(userLocation.lat, userLocation.lng, d.lat, d.lng) <= currentRadius;
            }).length;

            text.innerHTML = '<b>' + nearestSite.name + '</b> · ' + formatDistance(nearestDist) +
                (currentRadius !== Infinity ? ' · <em>' + nearbyCount + '台</em>' : ' · <em>全部</em>');
        }

        // ========== SITE STRIP ==========
        function selectSite(siteId) {
            currentSite = siteId;
            document.querySelectorAll('.site-mini-card').forEach(function(c) {
                c.classList.toggle('active', c.dataset.site === siteId);
            });
            renderDevices();
        }

        function renderSiteStrip() {
            var container = document.getElementById('siteStrip');
            var siteDists = {};
            if (userLocation) sites.forEach(function(s) { siteDists[s.id] = calcDistance(userLocation.lat, userLocation.lng, s.lat, s.lng); });

            var sortedSites = sites.slice();
            if (userLocation) sortedSites.sort(function(a,b) { return (siteDists[a.id]||Infinity) - (siteDists[b.id]||Infinity); });

            var totalNearby = userLocation
                ? allDevices.filter(function(d) { return calcDistance(userLocation.lat,userLocation.lng,d.lat,d.lng)<=currentRadius; }).length
                : allDevices.length;

            var html = '<div class="site-mini-card'+(currentSite==='all'?' active':'')+'" onclick="selectSite(\'all\')" data-site="all">' +
                '<div class="smc-name">附近全部</div><div class="smc-meta">'+totalNearby+'台设备</div></div>';

            sortedSites.forEach(function(s) {
                var nc = userLocation
                    ? allDevices.filter(function(d){return d.site===s.id&&calcDistance(userLocation.lat,userLocation.lng,d.lat,d.lng)<=currentRadius;}).length
                    : allDevices.filter(function(d){return d.site===s.id;}).length;
                var distStr = userLocation && siteDists[s.id] !== undefined ? ' · '+formatDistance(siteDists[s.id]) : '';
                html += '<div class="site-mini-card'+(currentSite===s.id?' active':'')+(nc===0?' empty':'')+
                    '" onclick="selectSite(\''+s.id+'\')" data-site="'+s.id+'">'+
                    '<div class="smc-name">'+s.name+'</div>'+
                    '<div class="smc-meta">'+nc+'台'+distStr+'</div></div>';
            });
            container.innerHTML = html;
        }

        // ========== DEVICE LIST ==========
        function renderDevices() {
            var container = document.getElementById('deviceList');
            var searchText = (document.getElementById('deviceSearch').value || '').toLowerCase();

            var devices = allDevices.slice();
            if (currentSite !== 'all') devices = devices.filter(function(d) { return d.site === currentSite; });
            if (searchText) {
                devices = devices.filter(function(d) {
                    var site = sites.find(function(s) { return s.id === d.site; });
                    var iot = iotDevices.find(function(i) { return i.id === d.iotDevice; });
                    return d.id.toLowerCase().indexOf(searchText)!==-1 || d.name.toLowerCase().indexOf(searchText)!==-1 ||
                           d.type.toLowerCase().indexOf(searchText)!==-1 || d.location.toLowerCase().indexOf(searchText)!==-1 ||
                           (site && site.name.toLowerCase().indexOf(searchText)!==-1) ||
                           (iot && iot.name.toLowerCase().indexOf(searchText)!==-1);
                });
            }
            if (userLocation) {
                devices.forEach(function(d) { d._dist = calcDistance(userLocation.lat, userLocation.lng, d.lat, d.lng); });
                devices = devices.filter(function(d) { return d._dist <= currentRadius; });
                devices.sort(function(a,b) { return a._dist - b._dist; });
            }

            document.getElementById('resultCount').textContent = devices.length + ' 台设备';
            document.getElementById('resultHint').textContent = userLocation
                ? (currentRadius !== Infinity ? (currentRadius>=1000?(currentRadius/1000)+'km':currentRadius+'m') + '内 · 按距离排序' : '不限范围 · 按距离排序') : '';

            if (devices.length === 0) {
                var et, ed, ea;
                if (searchText) { et='未找到匹配的设备'; ed='试试其他关键词'; ea='clearSearch()'; }
                else if (userLocation) { var rl=currentRadius!==Infinity?(currentRadius>=1000?(currentRadius/1000)+'km':currentRadius+'m'):'全部范围'; et='范围内无设备'; ed='当前'+rl+'内未发现设备'; ea='setRadius(5000)'; }
                else { et='请先获取位置'; ed='获取位置后将展示附近设备'; ea='getLocation()'; }
                container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="bi '+(searchText?'bi-search':'bi-geo-alt')+'"></i></div>'+
                    '<div class="empty-title">'+et+'</div><div class="empty-desc">'+ed+'</div>'+
                    '<button class="empty-action" onclick="'+ea+'">'+(searchText?'清除搜索':userLocation?'扩大到5km':'获取位置')+'</button></div>';
                return;
            }

            // Group by site → iotDevice
            var html = '', lastSite = null, lastIot = null, subHtml = '';
            devices.forEach(function(d, idx) {
                var site = sites.find(function(s) { return s.id === d.site; });
                var iot = iotDevices.find(function(i) { return i.id === d.iotDevice; });

                // New site group header
                if (currentSite==='all' && lastSite !== d.site) {
                    if (lastSite !== null) {
                        html += subHtml + '</div>';  // close previous sub-device-list
                    }
                    lastSite = d.site; lastIot = null; subHtml = '';
                    var sd = devices.filter(function(x){return x.site===d.site});
                    html += '<div class="group-header"><div class="group-dot" style="background:'+(site?site.color:'#8E8E93')+'"></div>'+
                        '<span class="group-name">'+(site?site.name:'')+'</span><span class="group-count">'+sd.length+'台</span></div>';
                }

                // New IOT device header within the same site
                if (lastIot !== d.iotDevice) {
                    if (lastIot !== null) {
                        html += subHtml + '</div>';  // close previous sub-device-list
                    }
                    lastIot = d.iotDevice; subHtml = '';
                    var iotSubCount = devices.filter(function(x){return x.iotDevice===d.iotDevice}).length;
                    var iotDistHtml = '';
                    if (userLocation && iot && iot.lat !== undefined) {
                        var iotDist = calcDistance(userLocation.lat, userLocation.lng, iot.lat, iot.lng);
                        iotDistHtml = '<span class="device-dist-badge '+getDistClass(iotDist)+'">'+formatDistance(iotDist)+'</span>';
                    }
                    html += '<div class="iot-device-header"><div class="iot-device-dot"></div>'+
                        '<span class="iot-device-name">'+(iot?iot.name:'IOT设备')+'</span>'+
                        iotDistHtml +
                        '<span class="iot-device-sub-count">'+iotSubCount+'个子设备</span></div>'+
                        '<div class="sub-device-list">';
                }

                // Sub-device card
                subHtml += '<div class="device-card" onclick="selectDevice(\''+d.id+'\')">'+
                    '<div class="device-status-dot '+(d.status==='offline'?'offline':'online')+'"></div>'+
                    '<div class="device-icon '+d.iconClass+'"><i class="bi '+d.icon+'"></i></div>'+
                    '<div class="device-info"><div class="device-id">'+d.id+'</div><div class="device-detail">'+d.type+' · '+d.location+'</div></div>'+
                    '<div class="device-chevron"><i class="bi bi-chevron-right"></i></div></div>';

                // Last device — close sub-device-list
                if (idx === devices.length - 1) {
                    html += subHtml + '</div>';
                }
            });
            container.innerHTML = html;
        }

        // ========== SEARCH ==========
        document.getElementById('deviceSearch').addEventListener('input', function() {
            document.getElementById('searchClear').classList.toggle('show', this.value.length > 0);
            renderDevices();
        });
        function clearSearch() {
            document.getElementById('deviceSearch').value = '';
            document.getElementById('searchClear').classList.remove('show');
            renderDevices(); document.getElementById('deviceSearch').focus();
        }

        // ========== ACTION SHEET ==========
        function openActionSheet() { document.getElementById('actionSheetOverlay').classList.add('show'); }
        function closeActionSheet(e) { if(!e||e.target===document.getElementById('actionSheetOverlay')) document.getElementById('actionSheetOverlay').classList.remove('show'); }

        // ========== SCAN ==========
        function startScanDirect() {
            var ov = document.createElement('div');
            ov.className = 'full-overlay show';
            ov.innerHTML = '<div class="scan-frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div><div class="scan-line"></div></div>'+
                '<div class="overlay-hint">将二维码放入框内自动识别</div>'+
                '<button class="overlay-cancel" onclick="this.closest(\'.\'+\'full-overlay\').remove()">取消</button>';
            document.body.appendChild(ov);
            setTimeout(function() {
                ov.style.opacity='0'; ov.style.transition='opacity .3s';
                setTimeout(function(){ov.remove()},300);
                showToast('识别成功：DT-2024-001');
                setTimeout(function(){selectDevice('DT-2024-001')},600);
            }, 2000);
        }
        function handleQrCapture(event) {}

        // ========== NFC ==========
        function startNfc() { closeActionSheet(); document.getElementById('nfcOverlay').classList.add('show');
            setTimeout(function(){
                document.getElementById('nfcOverlay').classList.remove('show');
                showToast('NFC感应成功：DT-2024-002');
                setTimeout(function(){selectDevice('DT-2024-002')},600);
            },2500);
        }
        function cancelNfc() { document.getElementById('nfcOverlay').classList.remove('show'); }

        // ========== DEVICE SELECTION — 写 localStorage 并跳转主流程 ==========
        function selectDevice(deviceId) {
            var device = allDevices.find(function(d) { return d.id === deviceId; });
            if (!device) return;
            var iot = iotDevices.find(function(i) { return i.id === device.iotDevice; });
            var site = sites.find(function(s) { return s.id === device.site; });
            localStorage.setItem('selectedReplaceDevice', JSON.stringify({
                id: device.id,
                name: device.name,
                type: device.type,
                location: device.location,
                status: device.status,
                paramKeys: device.paramKeys,
                iotDevice: iot ? iot.name : null,
                site: site ? site.name : null,
                target: pickTarget
            }));
            // 直接跳转到主流程页
            window.location.href = 'device-replacement.html';
        }

        // ========== TOAST ==========
        function showToast(msg) {
            var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
            document.body.appendChild(t);
            setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove()},300)},1800);
        }

        // ========== NAV ==========
        function goBack() { window.history.back(); }

        // ========== PTR ==========
        (function(){
            var main=document.getElementById('mainContent'), ind=document.getElementById('ptrIndicator'), tStartY=0, pulling=false, thresh=60;
            main.addEventListener('touchstart',function(e){if(window.scrollY===0){tStartY=e.touches[0].clientY;pulling=true;}},{passive:true});
            main.addEventListener('touchmove',function(e){if(!pulling)return;if(e.touches[0].clientY-tStartY>20)ind.classList.add('show');},{passive:true});
            main.addEventListener('touchend',function(e){
                if(!pulling)return;pulling=false;
                if(e.changedTouches[0].clientY-tStartY>thresh)getLocation();
                setTimeout(function(){ind.classList.remove('show');},500);
            });
        })();

        // ========== INIT ==========
        renderSiteStrip(); renderDevices(); getLocation();
    </script>
</body>
</html>
