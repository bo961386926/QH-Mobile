            document.getElementById('paramCards').innerHTML = '';
            document.getElementById('paramChips').innerHTML = '';
            document.getElementById('paramSelection').style.display = 'none';
            document.getElementById('standardUpdateTime').textContent = '尚未获取';
            document.getElementById('standardUpdateTime').style.color = 'var(--gray-text)';
            
            // 清除照片和视频
            document.getElementById('photoGrid').innerHTML = '';
            document.getElementById('videoPreview').innerHTML = '';
            document.getElementById('photoUploadArea').classList.remove('disabled');
            document.getElementById('videoUploadArea').classList.remove('disabled');
            updatePhotoCounter();
            updateVideoCounter(0);
            
            // 清除环境标签
            document.querySelectorAll('.env-chip').forEach(function(c) { c.classList.remove('checked'); });
            
            // 重置获取按钮
            var btn = document.getElementById('fetchStandardBtn');
            btn.disabled = false;
            btn.style.opacity = '1';
            document.getElementById('fetchIcon').className = 'bi bi-cloud-arrow-down';
            document.getElementById('fetchIcon').style.animation = 'none';
            document.getElementById('fetchText').textContent = '获取平台值';
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.color = 'var(--primary-color)';
            btn.style.background = 'rgba(0,122,255,0.06)';
            
            selectedParams = [];
            allParams = [];
            
            // 清除备注
            document.getElementById('remarkText').value = '';
            if (audioRecordings['remarkText']) {
                audioRecordings['remarkText'] = [];
                renderAudioList('remarkText');
            }
        }
        
        // ========== 保存草稿 ==========
        function saveDraft() {
            var deviceInfo = JSON.parse(localStorage.getItem('selectedDevice') || '{}');
            var paramsData = [];
            selectedParams.forEach(function(key) {
                var param = allParams.find(function(p) { return p.key === key; });
                paramsData.push({
                    key: key,
                    label: param ? param.label : key,
                    standardValue: document.getElementById('std-' + key).value,
                    measureValue: document.getElementById('mea-' + key).value,
                    reason: (document.getElementById('reasonText-' + key) || {}).value || ''
                });
            });
            var draft = {
                deviceId: deviceInfo.id || document.getElementById('selectedDeviceId').textContent,
                comparisonType: document.querySelector('.type-chip.active').getAttribute('data-value'),
                selectedParamKeys: selectedParams,
                params: paramsData,
                env: getSelectedEnv(),
                remark: document.getElementById('remarkText').value || '',
                savedAt: new Date().toISOString()
            };
            localStorage.setItem('comparisonDraft', JSON.stringify(draft));
            showToast('草稿已保存');
        }
        
        // ========== 加载草稿 ==========
        function loadDraft() {
            var draft = JSON.parse(localStorage.getItem('comparisonDraft') || 'null');
            if (!draft) return;
            var deviceInfo = JSON.parse(localStorage.getItem('selectedDevice') || '{}');
            if (draft.deviceId !== (deviceInfo.id || document.getElementById('selectedDeviceId').textContent)) return;
            
            // 恢复比对类型
            document.querySelectorAll('.type-chip').forEach(function(c) { c.classList.remove('active'); });
            var typeChip = document.querySelector('.type-chip[data-value="' + draft.comparisonType + '"]');
            if (typeChip) typeChip.classList.add('active');
            
            // 恢复环境标签
            if (draft.env) {
                draft.env.forEach(function(v) {
                    if (v.indexOf('custom:') === 0) {
                        // 自定义标签：重新创建
                        var text = v.substring(7);
                        var container = document.getElementById('envCustomChips');
                        var tag = document.createElement('div');
                        tag.className = 'env-custom-tag';
                        tag.dataset.text = text;
                        tag.innerHTML = '<span>' + text + '</span><button class="tag-remove" onclick="removeCustomEnv(this)"><i class="bi bi-x"></i></button>';
                        container.appendChild(tag);
                    } else {
                        var chip = document.querySelector('.env-chip[data-value="' + v + '"]');
                        if (chip) chip.classList.add('checked');
                    }
                });
            }
            
            // 恢复备注
            if (draft.remark) {
                document.getElementById('remarkText').value = draft.remark;
            }
            
            // 注意：参数值需要先 fetchStandard 才能恢复，这里仅标记
            showToast('已恢复草稿（请点击"获取平台值"后自动填充）');
            window._pendingDraft = draft;
            localStorage.removeItem('comparisonDraft');
        }
        
        // ========== 提交表单 ==========
        function submitForm() {
            if (selectedParams.length === 0) {
                alert('请先获取平台值进行比对');
                return;
            }
            
            var comparisonType = document.querySelector('.type-chip.active').getAttribute('data-value');
            var typeLabel = {periodic:'周期性校准',fault:'故障排查',acceptance:'验收测试'}[comparisonType];
            var deviceInfo = JSON.parse(localStorage.getItem('selectedDevice') || '{}');
            var envSelected = getSelectedEnv();
            var photoCount = document.querySelectorAll('#photoGrid .photo-item').length;
            var hasVideo = document.getElementById('videoPreview').children.length > 0;
            
            // 收集所有参数数据并验证
            var paramsResults = [];
            var hasEmpty = false;
            var hasMissingReason = false;
            var warnItems = [];  // 黄色偏差项
            var errorItems = []; // 红色偏差项
            
            selectedParams.forEach(function(key) {
                var param = allParams.find(function(p) { return p.key === key; });
                var stdVal = document.getElementById('std-' + key).value;
                var meaVal = document.getElementById('mea-' + key).value;
                var reasonEl = document.getElementById('reasonText-' + key);
                var reason = reasonEl ? reasonEl.value.trim() : '';
                
                if (!meaVal) { hasEmpty = true; }
                
                var std = parseFloat(stdVal) || 0;
                var mea = parseFloat(meaVal) || 0;
                var dev = mea - std;
                var absDev = Math.abs(dev);
                var percentDev = std !== 0 ? (absDev / Math.abs(std)) * 100 : (absDev * 100);
                
                // 判断偏差等级
                var level = 'normal';
                if (percentDev > DEVIATION_WARN) {
                    level = 'error';
                    if (!reason) hasMissingReason = true;
                    errorItems.push({ label: param.label, percent: percentDev, deviation: dev, unit: param.unit });
                } else if (percentDev > DEVIATION_NORMAL) {
                    level = 'warn';
                    if (!reason) hasMissingReason = true;
                    warnItems.push({ label: param.label, percent: percentDev, deviation: dev, unit: param.unit });
                }
                
                paramsResults.push({
                    key: key,
                    label: param.label,
                    standardValue: stdVal,
                    measureValue: meaVal,
                    deviation: dev.toFixed(2),
                    percentDeviation: percentDev.toFixed(1),
                    unit: param.unit,
                    tolerance: param.tolerance,
                    reason: reason,
                    level: level
                });
            });
            
            // 验证：有未填写的值
            if (hasEmpty) {
                alert('请填写所有已选指标的第三方设备值');
                return;
            }
            
            // 验证：偏差异常但未填写原因
            if (hasMissingReason) {
                alert('存在偏差超出允许范围的指标（黄色/红色标记），请填写偏差原因后再提交');
                return;
            }
            
            // 有黄色或红色偏差项 → 弹出确认对话框
            if (errorItems.length > 0 || warnItems.length > 0) {
                showDeviationConfirmDialog(errorItems, warnItems, function(confirmed) {
                    if (confirmed) {
                        doSubmit(deviceInfo, typeLabel, paramsResults, envSelected, photoCount, hasVideo);
                    }
                });
                return;
            }
            
            // 全部正常，直接提交
            doSubmit(deviceInfo, typeLabel, paramsResults, envSelected, photoCount, hasVideo);
        }
        
        // ========== 偏差确认弹窗 ==========
        function showDeviationConfirmDialog(errorItems, warnItems, callback) {
            var overlay = document.createElement('div');
            overlay.id = 'deviationConfirmOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:350;display:flex;align-items:center;justify-content:center;';
            
            var contentHtml = '<div style="background:white;border-radius:14px;padding:24px 20px;width:90%;max-width:360px;max-height:70vh;overflow-y:auto;">';
            
            // 标题
            if (errorItems.length > 0) {
                contentHtml += '<div style="text-align:center;margin-bottom:16px;">';
                contentHtml += '<div style="font-size:40px;margin-bottom:8px;">⚠️</div>';
                contentHtml += '<div style="font-size:17px;font-weight:700;color:var(--danger-color);">偏差异常警告</div>';
                contentHtml += '<div style="font-size:13px;color:var(--gray-text);margin-top:4px;">以下指标偏差超出允许范围，提交后可能被标记为不合格</div>';
                contentHtml += '</div>';
            } else {
                contentHtml += '<div style="text-align:center;margin-bottom:16px;">';
                contentHtml += '<div style="font-size:40px;margin-bottom:8px;">⚡</div>';
                contentHtml += '<div style="font-size:17px;font-weight:700;color:var(--warning-color);">偏差偏大提醒</div>';
                contentHtml += '<div style="font-size:13px;color:var(--gray-text);margin-top:4px;">以下指标存在一定偏差，请确认是否继续提交</div>';
                contentHtml += '</div>';
            }
            
            // 红色项
            if (errorItems.length > 0) {
                contentHtml += '<div style="font-size:12px;font-weight:600;color:var(--danger-color);margin-bottom:6px;">🔴 严重偏差（>15%）</div>';
                errorItems.forEach(function(item) {
                    contentHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,59,48,0.06);border:1px solid rgba(255,59,48,0.2);border-radius:8px;margin-bottom:6px;font-size:13px;">';
                    contentHtml += '<span style="color:var(--dark-text);">' + item.label + '</span>';
                    contentHtml += '<span style="color:var(--danger-color);font-weight:600;">' + (item.deviation > 0 ? '+' : '') + item.deviation.toFixed(2) + ' ' + item.unit + ' (' + item.percent.toFixed(1) + '%)</span>';
                    contentHtml += '</div>';
                });
            }
            
            // 黄色项
            if (warnItems.length > 0) {
                contentHtml += '<div style="font-size:12px;font-weight:600;color:var(--warning-color);margin-bottom:6px;margin-top:10px;">🟡 偏差偏大（5%-15%）</div>';
                warnItems.forEach(function(item) {
                    contentHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,149,0,0.06);border:1px solid rgba(255,149,0,0.2);border-radius:8px;margin-bottom:6px;font-size:13px;">';
                    contentHtml += '<span style="color:var(--dark-text);">' + item.label + '</span>';
                    contentHtml += '<span style="color:var(--warning-color);font-weight:600;">' + (item.deviation > 0 ? '+' : '') + item.deviation.toFixed(2) + ' ' + item.unit + ' (' + item.percent.toFixed(1) + '%)</span>';
                    contentHtml += '</div>';
                });
            }
            
            // 按钮
            contentHtml += '<div style="display:flex;gap:10px;margin-top:16px;">';
            contentHtml += '<button id="devCancelBtn" style="flex:1;padding:12px;border:1px solid var(--border-color);background:#f5f5f5;border-radius:10px;font-size:14px;font-weight:500;color:var(--dark-text);cursor:pointer;">返回修改</button>';
            contentHtml += '<button id="devConfirmBtn" style="flex:1;padding:12px;border:none;background:var(--danger-color);color:white;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">仍要提交</button>';
            contentHtml += '</div>';
            
            contentHtml += '</div>';
            overlay.innerHTML = contentHtml;
            document.body.appendChild(overlay);
            
            // 点击遮罩关闭
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.remove();
                    callback(false);
                }
            });
            
            document.getElementById('devCancelBtn').addEventListener('click', function() {
                overlay.remove();
                callback(false);
            });
            
            document.getElementById('devConfirmBtn').addEventListener('click', function() {
                overlay.remove();
                callback(true);
            });
        }
        
        // ========== 执行提交 ==========
        function doSubmit(deviceInfo, typeLabel, paramsResults, envSelected, photoCount, hasVideo) {
            var record = {
                id: 'CR-' + Date.now(),
                deviceId: deviceInfo.id || document.getElementById('selectedDeviceId').textContent,
                deviceName: deviceInfo.name || document.getElementById('selectedDeviceDesc').textContent,
                comparisonType: typeLabel,
                params: paramsResults,
                environment: envSelected,
                remark: document.getElementById('remarkText').value || '',
                hasRemarkAudio: (audioRecordings['remarkText'] && audioRecordings['remarkText'].length > 0),
                photoCount: photoCount,
                hasVideo: hasVideo,
                watermarkEnabled: watermarkEnabled,
                operator: (JSON.parse(localStorage.getItem('currentUser') || '{}').name || '未知') + '（' + (JSON.parse(localStorage.getItem('currentUser') || '{}').id || '--') + '）',
                timestamp: new Date().toISOString(),
                cloudStatus: 'uploading'
            };
            
            showUploadOverlay(record);
        }
        
        // ========== 上报动画 ==========
        function showUploadOverlay(record) {
            var overlay = document.createElement('div');
            overlay.id = 'uploadOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = '<div style="background:white;border-radius:12px;padding:32px 24px;text-align:center;width:300px;">' +
                '<div id="uploadSpinner" style="width:48px;height:48px;border:4px solid #E5E5EA;border-top-color:#007AFF;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;"></div>' +
                '<div id="uploadTitle" style="font-size:16px;font-weight:600;color:#1C1C1E;margin-bottom:8px;">正在上报云平台...</div>' +
                '<div id="uploadDesc" style="font-size:13px;color:#8E8E93;">比对数据上传中，请稍候</div></div>';
            document.body.appendChild(overlay);
            
            setTimeout(function() {
                var records = JSON.parse(localStorage.getItem('calibrationRecords') || '[]');
                record.cloudStatus = 'uploaded';
                records.unshift(record);
                localStorage.setItem('calibrationRecords', JSON.stringify(records));
                
                // 构建偏差摘要
                var devSummary = '';
                record.params.forEach(function(p) {
                    var devNum = parseFloat(p.deviation);
                    var percentNum = parseFloat(p.percentDeviation) || 0;
                    var icon, color;
                    if (p.level === 'error') {
                        icon = '<span style="color:#FF3B30;">✗</span>';
                        color = 'color:#FF3B30;';
                    } else if (p.level === 'warn') {
                        icon = '<span style="color:#FF9500;">!</span>';
                        color = 'color:#FF9500;';
                    } else {
                        icon = '<span style="color:#34C759;">✓</span>';
                        color = 'color:#34C759;';
                    }
                    devSummary += '<div style="margin-bottom:2px;">' + icon + ' <span style="' + color + '">' + p.label + '：' + (devNum > 0 ? '+' : '') + p.deviation + ' ' + p.unit + ' (' + percentNum.toFixed(1) + '%)</span></div>';
                });
                
                document.getElementById('uploadSpinner').style.display = 'none';
                document.getElementById('uploadTitle').innerHTML = '<i class="bi bi-check-circle-fill" style="color:#34C759;font-size:32px;"></i><br>上报成功';
                document.getElementById('uploadDesc').innerHTML =
                    '<div style="text-align:left;margin-top:12px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px;color:#666;">' +
                    '<div style="margin-bottom:4px;"><b>记录编号：</b>' + record.id + '</div>' +
                    '<div style="margin-bottom:4px;"><b>设备：</b>' + record.deviceId + '</div>' +
                    '<div style="margin-bottom:4px;"><b>操作人员：</b>' + record.operator + '</div>' +
                    '<div style="margin-bottom:6px;">' + devSummary + '</div>' +
                    '<div style="margin-bottom:4px;"><b>现场证据：</b>' + record.photoCount + ' 张照片' + (record.hasVideo ? ' + 1 个视频' : '') + (record.watermarkEnabled ? '（已加水印）' : '') + '</div>' +
                    '<div><b>云端状态：</b><span style="color:#34C759;">✓ 已上报</span></div></div>';
                
                var actionDiv = document.createElement('div');
                actionDiv.style.cssText = 'display:flex;gap:8px;margin-top:16px;';
                actionDiv.innerHTML =
                    '<button onclick="document.getElementById(\'uploadOverlay\').remove();window.history.back();" style="flex:1;padding:10px;border:1px solid #E5E5EA;background:#f5f5f5;border-radius:8px;font-size:14px;cursor:pointer;">返回</button>' +
                    '<button onclick="document.getElementById(\'uploadOverlay\').remove();resetForm();" style="flex:1;padding:10px;border:none;background:#007AFF;color:white;border-radius:8px;font-size:14px;cursor:pointer;">继续比对</button>';
                overlay.querySelector('div').appendChild(actionDiv);
            }, 1500);
        }
        
        // ========== 平台同步检测 ==========
        function checkSyncFromPlatform() {
            var syncData = localStorage.getItem('syncToDevice_' + (JSON.parse(localStorage.getItem('selectedDevice') || '{}').id || ''));
            if (syncData) {
                var info = JSON.parse(syncData);
                var banner = document.createElement('div');
                banner.style.cssText = 'margin:0 16px 12px;padding:12px;background:rgba(52,199,89,0.08);border:1px solid rgba(52,199,89,0.3);border-radius:8px;font-size:13px;color:#34C759;display:flex;gap:8px;align-items:center;';
                banner.innerHTML = '<i class="bi bi-cloud-arrow-down" style="font-size:18px;"></i><div>已收到平台同步的校准记录 <b>' + info.recordId + '</b>，请核实数据标记。</div>';
                document.querySelector('.main-content').insertBefore(banner, document.querySelector('.device-card'));
                localStorage.removeItem('syncToDevice_' + info.deviceId);
            }
        }
        
        function goBack() { window.history.back(); }
        
        // ========== 初始化 ==========
        window.addEventListener('load', function() {
            initPage();
            checkSyncFromPlatform();
            resetForm();
            loadDraft();
        });
    </script>
</body>
